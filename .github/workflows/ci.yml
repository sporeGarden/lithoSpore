# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (pedantic)
        run: cargo clippy --workspace -- -D warnings

      - name: Build (release)
        run: cargo build --release --workspace

      - name: Unit tests
        run: cargo test --workspace

      - name: Install b3sum
        run: cargo install b3sum --locked

      - name: Fetch data
        run: |
          bash scripts/fetch_wiser_2013.sh
          bash scripts/fetch_barrick_2009.sh

      - name: Module 1 — Rust Tier 2
        run: |
          ./target/release/ltee-fitness \
            --data-dir artifact/data/wiser_2013 \
            --expected validation/expected/module1_fitness.json \
            --max-tier 2

      - name: Module 2 — Rust Tier 2
        run: |
          ./target/release/ltee-mutations \
            --data-dir artifact/data/barrick_2009 \
            --expected validation/expected/module2_mutations.json \
            --max-tier 2

      - name: Litho CLI validate
        run: |
          # Exit code 2 = SKIP (module 5 scaffold), which is expected.
          # The CLI exits with the worst status: 0=all pass, 1=any fail, 2=any skip (no fail).
          set +e
          ./target/release/litho validate --json
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "::error::Validation produced FAIL results"
            exit 1
          fi
          # Exit code 0 (all pass) or 2 (skip only, no fail) are acceptable

      - name: Shellcheck fetch scripts
        run: shellcheck scripts/fetch_*.sh

  python-baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install numpy scipy

      - name: Module 1 — Python Tier 1
        run: python3 notebooks/module1_fitness/power_law_fitness.py

      - name: Module 2 — Python Tier 1
        run: python3 notebooks/module2_mutations/mutation_accumulation.py

      - name: Module 3 — Python Tier 1
        run: python3 notebooks/module3_alleles/allele_trajectories.py

      - name: Module 4 — Python Tier 1
        run: python3 notebooks/module4_citrate/citrate_innovation.py

      - name: Module 6 — Python Tier 1
        run: python3 notebooks/module6_breseq/breseq_comparison.py

      - name: Module 7 — Python Tier 1
        run: python3 notebooks/module7_anderson/anderson_predictions.py
