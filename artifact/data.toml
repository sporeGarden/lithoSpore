# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Data Manifest — every dataset in the LTEE guideStone artifact.
#
# TWO-TIER DATA MODEL:
#
#   The spore ships SMALL data (summary statistics, published parameters,
#   expected values). When deployed in a live environment with internet,
#   it can pull FULL data (raw sequencing reads, complete archives) and
#   re-validate at deeper granularity.
#
#   data_tier = "summary"   → shipped on spore (~KB), validates from published stats
#   data_tier = "complete"  → shipped on spore (full dataset present, e.g. BioBricks CSVs)
#   data_tier = "internal"  → generated/derived, no external source
#
#   full_data_size   = estimated size of the upstream raw data
#   full_data_tool   = tool needed to pull full data (e.g. "sra-toolkit", "wget")
#   full_data_checks = additional checks possible with full data
#
# STATUS CONVENTION:
#   fetched    = source data retrieved, hashed, present on disk
#   derived    = data derived from expected values / published parameters
#   internal   = generated data, no external source
#
# PROVENANCE: Each entry has a source_uri for re-pulling and re-validating.

[meta]
artifact = "ltee-guidestone"
