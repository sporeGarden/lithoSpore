# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Scope Graph — birth certificate for the LTEE Targeted GuideStone.
# Declares which ecosystem components contribute to this artifact.

[guidestone]
name = "ltee-guidestone"
version = "0.1.0"
target = "Barrick Lab — Long-Term Evolution Experiment"
created = "2026-05-11"
standard = "TARGETED_GUIDESTONE_STANDARD v1.0"
targets_file = "data/targets/ltee_validation_targets.toml"
graph_file = "graphs/ltee_guidestone.toml"

# --- Contributing Springs ---

[[spring]]
name = "wetSpring"
contributes = [
    "diversity metrics (Shannon, Pielou, UniFrac)",
    "sovereign 16S pipeline",
    "OTU analysis",
    "264-genome download pipeline",
]
modules = ["ltee-fitness", "ltee-breseq"]
papers = ["B1", "B2", "B3", "B4", "B5", "B6", "B7", "B8", "E1", "E5"]

[[spring]]
name = "groundSpring"
contributes = [
    "drift vs selection statistics",
    "jackknife + AIC/BIC model selection",
    "clonal interference statistics",
    "rare event probability framework",
    "Anderson Wc disorder analogy",
    "epistasis quantification",
    "DFE fitting (gamma/exponential/lognormal)",
]
modules = ["ltee-fitness", "ltee-mutations", "ltee-alleles", "ltee-citrate", "ltee-biobricks", "ltee-breseq", "ltee-anderson"]
papers = ["B1", "B2", "B3", "B4", "B6", "B7", "B8", "B9"]

[[spring]]
name = "neuralSpring"
contributes = [
    "LSTM time-series prediction",
    "ESN regime detection",
    "HMM clade state detection",
    "ML burden prediction from sequence features",
    "early warning ESN for pre-citrate trajectories",
]
modules = ["ltee-mutations", "ltee-alleles", "ltee-citrate", "ltee-biobricks"]
papers = ["B1", "B2", "B3", "B4", "B6", "B7", "B8", "B9", "E2", "E3", "E4", "E5"]

[[spring]]
name = "hotSpring"
contributes = [
    "Anderson disorder analogy (fitness as disordered potential)",
    "DFE ↔ RMT connection (eigenvalue distribution)",
]
modules = ["ltee-anderson"]
papers = ["B2", "B9"]

[[spring]]
name = "healthSpring"
contributes = [
    "symbiont PK/PD modeling",
    "protein-ligand binding predictions",
]
modules = []
papers = ["B5", "E2", "E4"]

[[spring]]
name = "airSpring"
contributes = [
    "FLS2 plant immunity sentinel",
]
modules = []
papers = ["E3"]

# --- Module Registry ---
# Per-module metadata for chassis-driven dispatch, parity, and assembly.
# The chassis reads these instead of compiled LTEE constants.

[[module]]
name = "power_law_fitness"
binary = "ltee-fitness"
data_dir = "artifact/data/wiser_2013"
expected = "validation/expected/module1_fitness.json"
tier1_notebook = "notebooks/module1_fitness/power_law_fitness.py"

[[module]]
name = "mutation_accumulation"
binary = "ltee-mutations"
data_dir = "artifact/data/barrick_2009"
expected = "validation/expected/module2_mutations.json"
tier1_notebook = "notebooks/module2_mutations/mutation_accumulation.py"

[[module]]
name = "allele_trajectories"
binary = "ltee-alleles"
data_dir = "artifact/data/good_2017"
expected = "validation/expected/module3_alleles.json"
tier1_notebook = "notebooks/module3_alleles/allele_trajectories.py"

[[module]]
name = "citrate_innovation"
binary = "ltee-citrate"
data_dir = "artifact/data/blount_2012"
expected = "validation/expected/module4_citrate.json"
tier1_notebook = "notebooks/module4_citrate/citrate_innovation.py"

[[module]]
name = "biobrick_burden"
binary = "ltee-biobricks"
data_dir = "artifact/data/biobricks_2024"
expected = "validation/expected/module5_biobricks.json"
tier1_notebook = "notebooks/module5_biobricks/biobrick_burden.py"

[[module]]
name = "breseq_264_genomes"
binary = "ltee-breseq"
data_dir = "artifact/data/tenaillon_2016"
expected = "validation/expected/module6_breseq.json"
tier1_notebook = "notebooks/module6_breseq/breseq_comparison.py"

[[module]]
name = "anderson_qs_predictions"
binary = "ltee-anderson"
data_dir = "artifact/data/anderson_predictions"
expected = "validation/expected/module7_anderson.json"
tier1_notebook = "notebooks/module7_anderson/anderson_predictions.py"

# --- Primals (Tier 3 only, optional) ---

[[primal]]
name = "rhizoCrypt"
tier = 3
required = false
purpose = "DAG provenance chain (when NUCLEUS available)"

[[primal]]
name = "loamSpine"
tier = 3
required = false
purpose = "Certificate chain for immutable provenance"

[[primal]]
name = "sweetGrass"
tier = 3
required = false
purpose = "Attribution braid integrity"

[[primal]]
name = "toadStool"
tier = 3
required = false
purpose = "GPU compute dispatch for accelerated validation"

# --- Foundation Threads ---

[[foundation_thread]]
id = "04"
name = "Environmental Genomics"
datasets = ["wiser_2013_fitness", "good_2017_alleles", "tenaillon_2016_genomes", "barrick_2009_mutations"]

[[foundation_thread]]
id = "07"
name = "Anderson Framework"
datasets = ["anderson_predictions", "dfe_evolution_2024"]

[[foundation_thread]]
id = "02"
name = "Plasma Physics / Lattice QCD"
datasets = []
notes = "RMT connection to DFE via eigenvalue distributions"

# --- Source Metadata (for `litho grow`) ---
# Enables the USB artifact to clone, build, and grow the full project
# on a clean system with internet access.

[source]
repo = "git@github.com:sporeGarden/lithoSpore.git"
repo_https = "https://github.com/sporeGarden/lithoSpore.git"
branch = "main"
ecosystem_repo = "git@github.com:sporeGarden/ecoPrimals.git"
ecosystem_repo_https = "https://github.com/sporeGarden/ecoPrimals.git"
rust_toolchain = "stable"
rust_target = "x86_64-unknown-linux-musl"
containerfile = "Containerfile"
license = "AGPL-3.0-or-later"
