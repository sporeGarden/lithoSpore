#
# Paper Registry — machine-readable bibliography for lithoSpore guideStone.
#
# Every module claim maps to a DOI, figure, and table. This file travels
# with the USB artifact so Barrick/Lenski can trace every number to its
# published source.
#
# status = "reproduced"  — lithoSpore module recomputes from data
# status = "validated"   — lithoSpore checks published values against tolerances
# status = "context"     — informs the work but is not directly replicated

[meta]
artifact = "ltee-guidestone"
last_updated = "2026-05-15"
total_papers = 16

