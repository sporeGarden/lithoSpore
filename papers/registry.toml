#  PRIMARY PAPERS — directly reproduced or validated by modules
# ─────────────────────────────────────────────────────────────

[[paper]]
id = "wiser2013"
doi = "10.1126/science.1243357"
title = "Long-term dynamics of adaptation in asexual populations"
authors = ["Wiser MJ", "Ribeck N", "Lenski RE"]
journal = "Science"
year = 2013
volume = "342"
pages = "1364-1367"
status = "reproduced"
litho_modules = ["ltee-fitness"]
figures_reproduced = ["Fig 1 (fitness trajectories)", "Fig 2 (power-law vs hyperbolic vs log)"]
tables_validated = ["Table 1 (power-law exponent β ≈ 0.12)"]
public_data_url = "https://datadryad.org/stash/dataset/doi:10.5061/dryad.0hc2m"
targets = ["T01", "T02"]
summary = "Demonstrates LTEE fitness follows a power law w(t) ~ t^β rather than approaching an asymptote. Module 1 reproduces the model comparison (AIC/BIC) and fits the exponent from Dryad CSV data."

[[paper]]
