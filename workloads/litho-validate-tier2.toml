#
# lithoSpore Tier 2 validation — dispatched by projectNUCLEUS
# Runs all 7 LTEE modules via Rust ecoBin binaries

[metadata]
name = "litho-validate-tier2"
description = "LTEE guideStone full Tier 2 validation — 7 modules, musl-static binaries"
version = "0.2.0"
thread = "05"
thread_name = "LTEE / Evolution"

[execution]
type = "native"
command = "$GARDENS_ROOT/lithoSpore/artifact/bin/litho validate --json"
working_dir = "$GARDENS_ROOT/lithoSpore/artifact"

[resources]
max_memory_bytes = 4294967296
max_cpu_percent = 100.0

[security]
isolation_level = "Standard"
trusted_directories = ["$GARDENS_ROOT/lithoSpore/artifact"]
